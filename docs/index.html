<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JIS 規格ビューア（プロトタイプ）</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
  :root {
    --ink: #1a1a1a;
    --sub: #666;
    --line: #ddd;
    --accent: #14532d;
    --bg: #fafaf8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.9;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 14px 24px;
  }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; }
  main { max-width: 860px; margin: 0 auto; padding: 24px; }
  #doc-select {
    font-size: 14px; padding: 6px 10px; margin-bottom: 20px;
    border: 1px solid var(--line); border-radius: 4px; background: #fff;
  }
  .page-marker {
    color: var(--sub); font-size: 12px; border-top: 1px dashed var(--line);
    padding-top: 8px; margin-top: 28px;
  }
  .b-heading { font-size: 17px; font-weight: 700; margin: 22px 0 6px; }
  .b-text { margin: 2px 0; }
  .b-caption { font-weight: 600; text-align: center; margin: 14px 0 6px; }
  .b-formula {
    background: #fff; border: 1px solid var(--line); border-radius: 6px;
    padding: 12px 16px; margin: 12px 0; overflow-x: auto;
  }
  .b-formula .katex-line { text-align: center; padding: 4px 0; }
  .b-formula img { max-width: 100%; display: block; margin: 0 auto; }
  .b-formula .raw {
    color: var(--sub); font-size: 11px; margin-top: 8px;
    border-top: 1px dotted var(--line); padding-top: 6px; word-break: break-all;
  }
  .page-image-link { font-size: 12px; }
  .page-image-link a { color: var(--accent); }
  .notice {
    background: #fff8e1; border: 1px solid #e6cc80; border-radius: 6px;
    padding: 14px 18px; font-size: 14px;
  }
  .error { color: #b00020; }
</style>
</head>
<body>
<header><h1>JIS 規格ビューア（プロトタイプ）</h1></header>
<main>
  <div id="app"><p>読み込み中…</p></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
